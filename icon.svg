<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Billionaire Money">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c2230"/>
      <stop offset="100%" stop-color="#0b0d12"/>
    </linearGradient>
    <linearGradient id="coin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5ef0c0"/>
      <stop offset="100%" stop-color="#37e0a6"/>
    </linearGradient>
    <linearGradient id="coin2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffd34e"/>
      <stop offset="100%" stop-color="#e6a800"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <rect x="4" y="4" width="120" height="120" rx="24" fill="none" stroke="#2a3242" stroke-width="2"/>
  <!-- stacked coins -->
  <ellipse cx="64" cy="78" rx="34" ry="10" fill="#1a9e72" opacity="0.5"/>
  <ellipse cx="64" cy="72" rx="34" ry="10" fill="url(#coin)" filter="url(#glow)"/>
  <ellipse cx="64" cy="66" rx="34" ry="10" fill="url(#coin2)"/>
  <ellipse cx="64" cy="60" rx="34" ry="10" fill="#ffd34e"/>
  <!-- won symbol -->
  <text x="64" y="67" text-anchor="middle" font-size="28" font-weight="800" font-family="Arial,Helvetica,sans-serif" fill="#062018">&#8361;</text>
  <!-- sparkle -->
  <circle cx="92" cy="36" r="4" fill="#37e0a6" opacity="0.9"/>
  <circle cx="36" cy="44" r="2.5" fill="#ffd34e" opacity="0.8"/>
</svg>
