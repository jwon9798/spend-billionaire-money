<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Spend Billionaire Money">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#151922"/>
      <stop offset="50%" stop-color="#0b0d12"/>
      <stop offset="100%" stop-color="#0e1118"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#37e0a6"/>
      <stop offset="100%" stop-color="#5ef0c0"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffd34e"/>
      <stop offset="100%" stop-color="#c9a000"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- decorative grid dots -->
  <g fill="#2a3242" opacity="0.4">
    <circle cx="100" cy="100" r="2"/><circle cx="200" cy="150" r="2"/><circle cx="1100" cy="80" r="2"/>
    <circle cx="1050" cy="550" r="2"/><circle cx="150" cy="520" r="2"/>
  </g>
  <!-- border frame -->
  <rect x="48" y="48" width="1104" height="534" rx="20" fill="none" stroke="#2a3242" stroke-width="2"/>
  <!-- large coin graphic left -->
  <g transform="translate(180,315)">
    <ellipse cx="0" cy="40" rx="90" ry="26" fill="#1a9e72" opacity="0.3"/>
    <ellipse cx="0" cy="30" rx="90" ry="26" fill="url(#accent)" filter="url(#glow)"/>
    <ellipse cx="0" cy="18" rx="90" ry="26" fill="url(#gold)"/>
    <ellipse cx="0" cy="6" rx="90" ry="26" fill="#ffd34e"/>
    <text x="0" y="18" text-anchor="middle" font-size="72" font-weight="800" font-family="Arial,Helvetica,sans-serif" fill="#062018">&#8361;</text>
  </g>
  <!-- title area - use paths/text that render everywhere -->
  <text x="620" y="260" text-anchor="middle" font-size="64" font-weight="800" font-family="Arial,Helvetica,sans-serif" fill="url(#accent)">Spend Billionaire Money</text>
  <text x="620" y="330" text-anchor="middle" font-size="32" font-family="Arial,Helvetica,sans-serif" fill="#9aa6bb">Forbes 2026 Real Net Worth Simulator</text>
    <text x="620" y="390" text-anchor="middle" font-size="26" font-family="Arial,Helvetica,sans-serif" fill="#5b6680">100+ Items  |  60s Challenge  |  Free to Play</text>
  <!-- accent line -->
  <rect x="420" y="420" width="400" height="4" rx="2" fill="url(#accent)" opacity="0.6"/>
  <!-- small coins right -->
  <g transform="translate(980,200)">
    <circle cx="0" cy="0" r="36" fill="#37e0a6" opacity="0.2"/>
    <circle cx="0" cy="0" r="28" fill="none" stroke="#37e0a6" stroke-width="3"/>
    <text x="0" y="10" text-anchor="middle" font-size="28" font-weight="700" font-family="Arial,Helvetica,sans-serif" fill="#37e0a6">&#8361;</text>
  </g>
  <g transform="translate(1040,380)">
    <circle cx="0" cy="0" r="24" fill="#ffd34e" opacity="0.15"/>
    <circle cx="0" cy="0" r="18" fill="none" stroke="#ffd34e" stroke-width="2"/>
    <text x="0" y="7" text-anchor="middle" font-size="18" font-weight="700" font-family="Arial,Helvetica,sans-serif" fill="#ffd34e">&#8361;</text>
  </g>
</svg>
